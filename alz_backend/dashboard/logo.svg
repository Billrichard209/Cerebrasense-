<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="CerebraSense Logo">
  <defs>
    <linearGradient id="g" x1="20" y1="30" x2="180" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9b5cf6"/>
      <stop offset="52%" stop-color="#6270e8"/>
      <stop offset="100%" stop-color="#00e5c3"/>
    </linearGradient>
    <linearGradient id="gL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9b5cf6" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#9b5cf6" stop-opacity=".9"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="100" cy="96" rx="54" ry="50" fill="url(#g)" opacity="0.07"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" stroke="url(#g)" stroke-width="1" opacity="0.18"/>

  <!-- Brain silhouette: left hemisphere -->
  <path d="M100,150 C87,150 71,144 59,134 C42,121 32,102 32,86
           C32,64 47,46 66,40 C76,37 87,38 95,43 C97,41 99,40 100,40"
        stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>

  <!-- Brain silhouette: right hemisphere -->
  <path d="M100,40 C101,40 103,41 105,43 C113,38 124,37 134,40
           C153,46 168,64 168,86 C168,102 158,121 141,134
           C129,144 113,150 100,150"
        stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>

  <!-- Top sulcus -->
  <path d="M95,43 C97,38 103,38 105,43" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>

  <!-- Brainstem -->
  <path d="M91,150 C91,156 95,160 100,160 C105,160 109,156 109,150"
        stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Center fissure -->
  <line x1="100" y1="40" x2="100" y2="150" stroke="url(#g)" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.28"/>

  <!-- LEFT: Fragmented paths (purple, dashed) -->
  <path d="M57,76 C67,71 78,75 82,83" stroke="#9b5cf6" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="2.5,3.5" opacity="0.7"/>
  <path d="M51,101 C63,96 74,99 79,108" stroke="#9b5cf6" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="2.5,3.5" opacity="0.7"/>
  <path d="M59,124 C70,119 78,122 81,130" stroke="#9b5cf6" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="2.5,3.5" opacity="0.7"/>

  <!-- Left nodes (small, dim) -->
  <circle cx="57" cy="76" r="3" fill="#9b5cf6" opacity="0.55"/>
  <circle cx="51" cy="101" r="3" fill="#9b5cf6" opacity="0.55"/>
  <circle cx="59" cy="124" r="3" fill="#9b5cf6" opacity="0.55"/>

  <!-- BRIDGE: Gradient guiding path (glowing) -->
  <path d="M82,83 C89,83 95,91 100,92 C105,93 112,90 119,87"
        stroke="url(#g)" stroke-width="2.4" stroke-linecap="round" filter="url(#gl)"/>

  <!-- Center node (hub) -->
  <circle cx="100" cy="92" r="5" fill="url(#g)" filter="url(#gl)"/>

  <!-- Spokes: center to right nodes -->
  <line x1="100" y1="92" x2="119" y2="109" stroke="url(#g)" stroke-width="0.9" opacity="0.45"/>
  <line x1="100" y1="92" x2="117" y2="127" stroke="url(#g)" stroke-width="0.9" opacity="0.45"/>

  <!-- RIGHT: Connected paths (teal, glowing) -->
  <path d="M119,87 C129,83 141,85 149,79" stroke="#00e5c3" stroke-width="2" stroke-linecap="round" filter="url(#gs)"/>
  <path d="M119,109 C130,104 141,107 149,101" stroke="#00e5c3" stroke-width="2" stroke-linecap="round" filter="url(#gs)"/>
  <path d="M117,127 C128,122 139,124 146,130" stroke="#00e5c3" stroke-width="2" stroke-linecap="round" filter="url(#gs)"/>

  <!-- Right nodes (teal, glowing) -->
  <circle cx="149" cy="79"  r="4.5" fill="#00e5c3" filter="url(#gs)"/>
  <circle cx="149" cy="101" r="4.5" fill="#00e5c3" filter="url(#gs)"/>
  <circle cx="146" cy="130" r="4.5" fill="#00e5c3" filter="url(#gs)"/>
</svg>
